name: CICD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  compile:
    runs-on: shrikant-runner
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile Code
        run: mvn compile


  test:
    runs-on: shrikant-runner
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests
        run: mvn test


  build_project:
    runs-on: shrikant-runner
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Package
        run: mvn package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


  docker_build_push:
    runs-on: shrikant-runner
    needs: build_project
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: shrikant0786/bankapp:${{ github.run_number }}
          file: ./Dockerfile
                    
          
  update_manifest:
    runs-on: shrikant-runner
    needs: docker_build_push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update image in Kubernetes manifest
        run: |
          sed -i 's|image: shrikant0786/bankapp.*|image: shrikant0786/bankapp:${{ github.run_number }}|g' kubernetes/*.yml

      - name: Commit and push changes
        run: |
          git config --global user.email "shrikantbhoskar321@gmail.com"
          git config --global user.name "Shrikant"
          git add .
          git commit -m "Update image tag"
          git push
            
          
